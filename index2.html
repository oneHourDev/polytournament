<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polytopia Tournament 2</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tournament-common.css">
</head>
<body>

<!-- Tournament Navigation -->
<div class="tournament-nav">
  <a href="index.html">Tournament 1</a>
  <a href="index2.html" class="active">Tournament 2</a>
</div>

<div class="wrapper">

  <header>
    <div class="title-eyebrow">⚔ Tournament 2 ⚔</div>
    <h1>Polytopia Tournament 2</h1>
    <div class="subtitle">Game Mode: Cymanti · 1v1 · Small (196 tiles) · Continents</div>
  </header>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>MATCHES PLAYED</span>
      <span id="progress-text">0 / 45</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard" id="scoreboard"></div>

  <!-- Matrix -->
  <div class="matrix-section">
    <div class="section-title">Match Results</div>
    <div class="matrix-wrap">
      <table class="matrix" id="matrix-table"></table>
    </div>
  </div>

  <!-- Rankings -->
  <div class="matrix-section" style="margin-top:2.5rem;">
    <div class="section-title">Rankings</div>
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
      <table class="rank-table" id="rank-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Player</th>
            <th>Points</th>
            <th>Wins</th>
            <th>Losses</th>
            <th>Remaining</th>
          </tr>
        </thead>
        <tbody id="rank-body"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Popup -->
<div class="popup-overlay" id="popup">
  <div class="popup">
    <h3>Who won?</h3>
    <div class="matchup-label" id="popup-matchup"></div>
    <div class="winner-selector" id="winner-selector"></div>
    <div class="hint">Click on the winner's avatar</div>
    <div class="popup-btns">
      <button class="btn btn-cancel" onclick="closePopup()">Cancel</button>
      <button class="btn btn-clear" onclick="clearResult()">Smazat</button>
    </div>
  </div>
</div>

<!-- Winner Celebration -->
<div class="celebration-overlay" id="celebration">
  <div class="celebration-content">
    <div class="celebration-title">🏆 TOURNAMENT WINNER! 🏆</div>
    <video class="winner-video" id="winner-video" autoplay loop muted style="display:none;">
      <source id="winner-video-source" src="" type="video/mp4">
    </video>
    <div class="winner-avatar-container" id="winner-avatar-container" style="display:none;">
      <img class="winner-avatar" id="winner-avatar" src="" alt="Winner">
    </div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-stats" id="winner-stats"></div>
    <button class="celebration-close" onclick="closeCelebration()">Close</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script src="tournament-common.js"></script>
