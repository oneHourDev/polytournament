<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polytopia Tournament 2</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0f1a;
    --panel:    #141828;
    --border:   #2a3060;
    --accent:   #c9933a;
    --gold:     #e8c06a;
    --win:      #2d6e3a;
    --loss:     #6e2d2d;
    --draw:     #2a3060;
    --text:     #d4c9b0;
    --muted:    #6b7094;
    --glow:     rgba(201,147,58,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Text', Georgia, serif;
    min-height: 100vh;/btw
    overflow-x: auto;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* Header */
  header {
    text-align: center;
    padding: 2.5rem 0 2rem;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    width: 320px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 1.5rem auto 0;
  }
  .title-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }
  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    color: var(--gold);
    text-shadow: 0 0 40px rgba(232,192,106,0.3);
    letter-spacing: 0.05em;
    line-height: 1.2;
  }
  .subtitle {
    font-style: normal;
    color: var(--accent);
    margin-top: 1rem;
    font-size: 1.1rem;
    font-weight: 600;
    padding: 0.8rem 1.5rem;
    background: rgba(201,147,58,0.08);
    border: 1px solid var(--accent);
    border-radius: 8px;
    display: inline-block;
    letter-spacing: 0.05em;
  }

  .save-btn {
    margin-top: 1rem;
    padding: 0.6rem 1.3rem;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 6px;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.3s ease;
  }

  .save-btn:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 15px var(--glow);
  }

  /* Scoreboard */
  .scoreboard {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin: 2rem 0;
  }
  .score-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.9rem 1.2rem;
    min-width: 130px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
    cursor: default;
  }
  .score-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
  }
  .score-card.leader {
    border-color: var(--gold);
    box-shadow: 0 0 25px rgba(232,192,106,0.2);
  }
  .score-card.leader::before {
    content: '👑';
    position: absolute;
    top: -2px;
    right: 6px;
    font-size: 0.85rem;
  }
  .sc-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--border);
    margin: 0 auto 0.5rem;
    display: block;
    object-fit: cover;
    background: var(--draw);
  }
  .sc-name {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    color: var(--gold);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sc-pts {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
    margin-top: 0.3rem;
  }
  .sc-pts span {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.1em;
  }
  .sc-record {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  /* Matrix section */
  .matrix-section {
    margin-top: 2.5rem;
  }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .matrix-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
  }

  table.matrix {
    border-collapse: collapse;
    width: 100%;
    min-width: 600px;
  }

  .matrix th, .matrix td {
    padding: 0;
    border: 1px solid var(--border);
  }

  /* Corner cell */
  .matrix .corner {
    background: var(--bg);
    width: 90px;
    min-width: 90px;
  }

  /* Column headers (top) */
  .col-header {
    background: var(--bg);
    text-align: center;
    width: 90px;
  }
  .col-header-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.8rem 0.4rem;
    gap: 0.3rem;
  }
  .col-header img {
    width: 62px;
    height: 62px;
    border-radius: 50%;
    border: 2px solid var(--border);
    object-fit: cover;
    background: var(--draw);
  }
  .col-header .player-idx {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Row headers (left) */
  .row-header {
    background: var(--bg);
    padding: 0.4rem 0.7rem;
    white-space: nowrap;
  }
  .row-header-inner {
    display: flex;
    align-items: center;
    gap: 0.55rem;
  }
  .row-header img {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: 2px solid var(--border);
    object-fit: cover;
    background: var(--draw);
    flex-shrink: 0;
  }
  .row-header .rh-name {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    color: var(--gold);
    letter-spacing: 0.03em;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 70px;
  }

  /* Result cells */
  td.result-cell {
    text-align: center;
    vertical-align: middle;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    width: 90px;
    height: 76px;
  }
  td.result-cell.diagonal {
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 5px,
      rgba(255,255,255,0.02) 5px,
      rgba(255,255,255,0.02) 10px
    );
    cursor: default;
    pointer-events: none;
  }
  td.result-cell.win   { background: rgba(45,110,58,0.35); }
  td.result-cell.loss  { background: rgba(110,45,45,0.35); }
  td.result-cell.empty { background: transparent; }
  td.result-cell:not(.diagonal):hover { background: rgba(201,147,58,0.12); }

  .result-display {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text);
    pointer-events: none;
    user-select: none;
  }
  td.win  .result-display { color: #7be89a; }
  td.loss .result-display { color: #e87b7b; }

  /* Input popup */
  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .popup-overlay.active { display: flex; }

  .popup {
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 1.8rem 2rem;
    min-width: 320px;
    box-shadow: 0 0 60px rgba(201,147,58,0.25);
    position: relative;
  }
  .popup h3 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .popup .matchup-label {
    font-style: italic;
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 1.2rem;
  }
  .popup input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
    color: var(--text);
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    outline: none;
    transition: border-color 0.2s;
  }
  .popup input:focus { border-color: var(--accent); }
  .popup .hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.4rem;
    font-style: italic;
  }

  .winner-selector {
    display: flex;
    gap: 2rem;
    justify-content: center;
    margin: 1.5rem 0;
  }

  .winner-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    padding: 1rem;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--bg);
    transition: all 0.3s ease;
    min-width: 120px;
  }

  .winner-option:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
    transform: translateY(-2px);
  }

  .winner-option.selected {
    border-color: var(--gold);
    box-shadow: 0 0 30px rgba(232,192,106,0.3);
    background: rgba(232,192,106,0.05);
  }

  .winner-option .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--border);
    margin-bottom: 0.8rem;
    object-fit: cover;
    background: var(--draw);
  }

  .winner-option.selected .avatar {
    border-color: var(--gold);
  }

  .winner-option .player-name {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold);
    text-align: center;
  }

  .popup-btns {
    display: flex;
    gap: 0.7rem;
    margin-top: 1.2rem;
  }
  .btn {
    flex: 1;
    padding: 0.55rem;
    border-radius: 6px;
    border: none;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-confirm { background: var(--accent); color: #0d0f1a; font-weight: 700; }
  .btn-cancel  { background: var(--border); color: var(--text); }
  .btn-clear   { background: var(--loss); color: #fff; flex: 0.6; }
  .btn:hover { opacity: 0.85; }

  /* Progress bar */
  .progress-wrap {
    margin-top: 2rem;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }
  .progress-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 0.6rem 1.4rem;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: var(--gold);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Rankings table */
  .rank-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 1rem;
  }
  .rank-table th {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 0.5rem 0.8rem;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  .rank-table td {
    padding: 0.5rem 0.8rem;
    border-bottom: 1px solid rgba(42,48,96,0.5);
    font-size: 0.95rem;
  }
  .rank-table tr:last-child td { border-bottom: none; }
  .rank-table .rank-no {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--muted);
    width: 30px;
  }
  .rank-table .rank-name {
    font-family: 'Cinzel', serif;
    font-size: 0.82rem;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .rank-table .rank-name img {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border);
    object-fit: cover;
    background: var(--draw);
  }
  .rank-table .pts { font-weight: 600; }
  .rank-table .wins  { color: #7be89a; }
  .rank-table .losses { color: #e87b7b; }
  .rank-table tr:first-child td { background: rgba(232,192,106,0.05); }

  /* Winner Celebration */
  .celebration-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 10000;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.5s ease;
  }
  .celebration-overlay.active {
    display: flex;
  }
  .celebration-content {
    text-align: center;
    position: relative;
    z-index: 2;
  }
  .celebration-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--gold);
    text-shadow: 0 0 40px rgba(232,192,106,0.6);
    margin-bottom: 2rem;
    animation: slideDown 0.8s ease;
  }
  .winner-avatar-container {
    position: relative;
    display: inline-block;
    margin: 2rem 0;
  }
  .winner-avatar {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 4px solid var(--gold);
    object-fit: cover;
    box-shadow: 0 0 60px rgba(232,192,106,0.6), 0 0 120px rgba(232,192,106,0.3);
    animation: avatarCelebrate 2s ease-in-out infinite;
  }
  .winner-video {
    width: 100%;
    max-width: 600px;
    border-radius: 12px;
    border: 4px solid var(--gold);
    box-shadow: 0 0 60px rgba(232,192,106,0.6), 0 0 120px rgba(232,192,106,0.3);
    margin: 1rem 0;
  }
  .winner-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    color: var(--gold);
    margin: 1.5rem 0 1rem;
    text-shadow: 0 0 20px rgba(232,192,106,0.4);
  }
  .winner-stats {
    font-size: 1.2rem;
    color: var(--text);
    margin: 1rem 0 2rem;
  }
  .celebration-close {
    margin-top: 2rem;
    padding: 0.8rem 2rem;
    background: var(--panel);
    border: 2px solid var(--accent);
    border-radius: 8px;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .celebration-close:hover {
    background: var(--accent);
    transform: scale(1.05);
    box-shadow: 0 0 20px var(--glow);
  }

  /* Confetti */
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: var(--gold);
    opacity: 0;
    animation: confettiFall 3s linear infinite;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideDown {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes avatarCelebrate {
    0%, 100% { transform: scale(1) rotate(0deg); }
    25% { transform: scale(1.1) rotate(-5deg); }
    50% { transform: scale(1.15) rotate(0deg); }
    75% { transform: scale(1.1) rotate(5deg); }
  }
  @keyframes confettiFall {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="title-eyebrow">⚔ Tournament 2 ⚔</div>
    <h1>Polytopia Tournament 2</h1>
    <div class="subtitle">Game Mode: Cymanti · 1v1 · Small (196 tiles) · Continents</div>
  </header>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>MATCHES PLAYED</span>
      <span id="progress-text">0 / 45</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard" id="scoreboard"></div>

  <!-- Matrix -->
  <div class="matrix-section">
    <div class="section-title">Match Results</div>
    <div class="matrix-wrap">
      <table class="matrix" id="matrix-table"></table>
    </div>
  </div>

  <!-- Rankings -->
  <div class="matrix-section" style="margin-top:2.5rem;">
    <div class="section-title">Rankings</div>
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
      <table class="rank-table" id="rank-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Player</th>
            <th>Points</th>
            <th>Wins</th>
            <th>Losses</th>
            <th>Remaining</th>
          </tr>
        </thead>
        <tbody id="rank-body"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Popup -->
<div class="popup-overlay" id="popup">
  <div class="popup">
    <h3>Who won?</h3>
    <div class="matchup-label" id="popup-matchup"></div>
    <div class="winner-selector" id="winner-selector">
      <!-- Player avatars will be inserted here -->
    </div>
    <div class="hint">Click on the winner's avatar</div>
    <div class="popup-btns">
      <button class="btn btn-cancel" onclick="closePopup()">Cancel</button>
      <button class="btn btn-clear"  onclick="clearResult()">Smazat</button>
    </div>
  </div>
</div>

<!-- Winner Celebration -->
<div class="celebration-overlay" id="celebration">
  <div class="celebration-content">
    <div class="celebration-title">🏆 TOURNAMENT WINNER! 🏆</div>
    <video class="winner-video" id="winner-video" autoplay loop muted style="display:none;">
      <source id="winner-video-source" src="" type="video/mp4">
    </video>
    <div class="winner-avatar-container" id="winner-avatar-container" style="display:none;">
      <img class="winner-avatar" id="winner-avatar" src="" alt="Winner">
    </div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-stats" id="winner-stats"></div>
    <button class="celebration-close" onclick="closeCelebration()">Close</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase SDK - must load before main script -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const PLAYERS = [
  { name: "MorPet87", avatar: "resources/img/MorPet87.jpeg" },
  { name: "WestieWarrior", avatar: "resources/img/WestieWarrior.jpeg" },
  { name: "OneHourPlayer", avatar: "resources/img/OneHourPlayer.jpeg" },
  { name: "Hukul", avatar: "resources/img/Hukul.jpeg" },
  { name: "ContrivedFort9", avatar: "resources/img/ContrivedFort9.jpeg" },
  { name: "JunkervonSturm", avatar: "resources/img/JunkervonSturm.jpeg" },
  { name: "Taodjinud", avatar: "resources/img/Taodjinud.jpeg" },
  { name: "OpenTheFckingStrait", avatar: "resources/img/OpenTheFckingStrait.jpeg" },
  { name: "JamesMoriarty8", avatar: "resources/img/JamesMoriarty8.jpeg" },
  { name: "thoryr", avatar: "resources/img/thoryr.jpeg" }
];
const N = PLAYERS.length;
const TOTAL = (N * (N - 1)) / 2;

// ─── STATE ─────────────────────────────────────────────────────────────────
// results[i][j]: "1:0" or "0:1" or null (i is row/winner perspective)
// Only upper triangle is "canonical" — we store for row < col
let results = {};

// ─── FIREBASE CONFIG ───────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBZtsslw-R17toTXbKBoikhc0vyOdAeDe0",
  authDomain: "polytournament-87d5b.firebaseapp.com",
  databaseURL: "https://polytournament-87d5b-default-rtdb.firebaseio.com",
  projectId: "polytournament-87d5b",
  storageBucket: "polytournament-87d5b.firebasestorage.app",
  messagingSenderId: "428892548438",
  appId: "1:428892548438:web:8c7a105e25fedd868b7af7"
};

// Initialize Firebase
let database;
let resultsRef;

function initFirebase() {
  if (typeof firebase !== 'undefined' && firebaseConfig.apiKey !== "YOUR_API_KEY") {
    try {
      // Check if Firebase app already exists, otherwise initialize
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      database = firebase.database();
      resultsRef = database.ref('tournament2/results');

      // Listen for real-time updates
      resultsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          results = data;
          render();
          checkTournamentComplete();
        }
      });
      console.log('✓ Firebase connected to tournament2');
      return true;
    } catch (e) {
      console.error('Firebase init failed:', e);
      return false;
    }
  }
  return false;
}

// Auto-save to Firebase (or localStorage fallback)
function autoSave() {
  if (resultsRef) {
    resultsRef.set(results).catch(e => console.error('Save failed:', e));
  } else {
    // Fallback to localStorage if Firebase not configured
    localStorage.setItem('polytournament2-results', JSON.stringify(results));
  }
}

// Load from localStorage (fallback if Firebase not configured)
function loadFromStorage() {
  const stored = localStorage.getItem('polytournament2-results');
  if (stored) {
    try {
      results = JSON.parse(stored);
    } catch (e) {
      console.error('Failed to load results:', e);
    }
  }
}
const key = (r,c) => `${r}-${c}`;

function getResult(r,c) {
  if (r === c) return null;
  if (r < c) return results[key(r,c)] || null;
  // mirror
  const v = results[key(c,r)] || null;
  if (!v) return null;
  return v === "1:0" ? "0:1" : "1:0";
}
function setResult(r,c,val) {
  // always store in r<c canonical form
  if (r < c) {
    results[key(r,c)] = val;
  } else {
    results[key(c,r)] = val === "1:0" ? "0:1" : "1:0";
  }
}
function clearResultAt(r,c) {
  if (r < c) delete results[key(r,c)];
  else delete results[key(c,r)];
}

// ─── AVATAR HELPER ─────────────────────────────────────────────────────────
function avatarEl(idx, size) {
  const p = PLAYERS[idx];
  if (p.avatar) {
    return `<img src="${p.avatar}" width="${size}" height="${size}" style="border-radius:50%;border:2px solid var(--border);object-fit:cover;" alt="${p.name}">`;
  }
  // generated initials fallback
  const initials = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const colors = ['#3a5a8a','#5a3a8a','#8a5a3a','#3a8a5a','#8a3a5a','#5a8a3a','#3a6a7a'];
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${colors[idx % colors.length]};display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:${Math.round(size*0.35)}px;color:#fff;border:2px solid var(--border);flex-shrink:0;">${initials}</div>`;
}

// ─── STATS ─────────────────────────────────────────────────────────────────
function calcStats() {
  return PLAYERS.map((_,i) => {
    let wins=0, losses=0, played=0, remaining=0;
    for (let j=0;j<N;j++) {
      if (i===j) continue;
      const r = getResult(i,j);
      if (r === "1:0") { wins++; played++; }
      else if (r === "0:1") { losses++; played++; }
      else remaining++;
    }
    return { idx:i, wins, losses, played, remaining, pts: wins };
  });
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function render() {
  renderMatrix();
  renderScoreboard();
  renderRankings();
  renderProgress();
}

function renderMatrix() {
  const t = document.getElementById('matrix-table');
  let html = '<thead><tr><th class="corner"></th>';
  for (let j=0;j<N;j++) {
    html += `<th class="col-header"><div class="col-header-inner">${avatarEl(j,62)}<span class="player-idx">${j+1}</span></div></th>`;
  }
  html += '</tr></thead><tbody>';
  for (let i=0;i<N;i++) {
    html += `<tr><td class="row-header"><div class="row-header-inner">${avatarEl(i,58)}<span class="rh-name">${PLAYERS[i].name}</span></div></td>`;
    for (let j=0;j<N;j++) {
      if (i===j) {
        html += `<td class="result-cell diagonal"></td>`;
      } else {
        const r = getResult(i,j);
        let cls = 'empty';
        let disp = 'add result';
        if (r==='1:0') { cls='win'; disp='1:0'; }
        else if (r==='0:1') { cls='loss'; disp='0:1'; }
        html += `<td class="result-cell ${cls}" onclick="openPopup(${i},${j})" title="${PLAYERS[i].name} vs ${PLAYERS[j].name}"><span class="result-display">${disp}</span></td>`;
      }
    }
    html += '</tr>';
  }
  html += '</tbody>';
  t.innerHTML = html;
}

function renderScoreboard() {
  const stats = calcStats().sort((a,b)=>b.pts-a.pts||b.wins-a.wins);
  const maxPts = stats[0]?.pts ?? 0;
  let html = '';
  stats.forEach(s => {
    const leader = s.pts === maxPts && s.pts > 0 ? 'leader' : '';
    html += `<div class="score-card ${leader}">
      ${avatarEl(s.idx,80)}
      <div class="sc-name">${PLAYERS[s.idx].name}</div>
      <div class="sc-pts">${s.pts} <span>POINTS</span></div>
      <div class="sc-record">${s.wins}V – ${s.losses}P</div>
    </div>`;
  });
  document.getElementById('scoreboard').innerHTML = html;
}

function renderRankings() {
  const stats = calcStats().sort((a,b)=>b.pts-a.pts||b.wins-a.wins||a.losses-b.losses);
  let html = '';
  stats.forEach((s,rank) => {
    html += `<tr>
      <td class="rank-no">${rank+1}.</td>
      <td><div class="rank-name">${avatarEl(s.idx,42)} ${PLAYERS[s.idx].name}</div></td>
      <td class="pts">${s.pts}</td>
      <td class="wins">${s.wins}</td>
      <td class="losses">${s.losses}</td>
      <td style="color:var(--muted)">${s.remaining}</td>
    </tr>`;
  });
  document.getElementById('rank-body').innerHTML = html;
}

function renderProgress() {
  let played = 0;
  for (let i=0;i<N;i++) for (let j=i+1;j<N;j++) if (results[key(i,j)]) played++;
  document.getElementById('progress-text').textContent = `${played} / ${TOTAL}`;
  document.getElementById('progress-fill').style.width = `${(played/TOTAL*100).toFixed(1)}%`;
}

// ─── POPUP ─────────────────────────────────────────────────────────────────
let activeCell = null;

function openPopup(r,c) {
  activeCell = {r,c};
  const existing = getResult(r,c);
  document.getElementById('popup-matchup').textContent =
    `${PLAYERS[r].name}  vs  ${PLAYERS[c].name}`;

  // Build winner selector with avatars
  const selector = document.getElementById('winner-selector');
  const player1 = PLAYERS[r];
  const player2 = PLAYERS[c];

  selector.innerHTML = `
    <div class="winner-option" data-winner="r" onclick="selectWinner('r')">
      ${avatarEl(r, 80).replace('class="avatar-circle"', 'class="avatar"')}
      <div class="player-name">${player1.name}</div>
    </div>
    <div class="winner-option" data-winner="c" onclick="selectWinner('c')">
      ${avatarEl(c, 80).replace('class="avatar-circle"', 'class="avatar"')}
      <div class="player-name">${player2.name}</div>
    </div>
  `;

  // Pre-select if result exists
  if (existing === '1:0') {
    setTimeout(() => document.querySelector('[data-winner="r"]').classList.add('selected'), 10);
  } else if (existing === '0:1') {
    setTimeout(() => document.querySelector('[data-winner="c"]').classList.add('selected'), 10);
  }

  document.getElementById('popup').classList.add('active');
}

function selectWinner(winner) {
  // Remove previous selection
  document.querySelectorAll('.winner-option').forEach(el => el.classList.remove('selected'));

  // Add selection to clicked option
  document.querySelector(`[data-winner="${winner}"]`).classList.add('selected');

  // Auto-confirm after selection
  setTimeout(() => confirmResult(winner), 300);
}

function closePopup() {
  document.getElementById('popup').classList.remove('active');
  activeCell = null;
}

function confirmResult(winner) {
  if (!activeCell) return;

  // If no winner passed, check for selected option
  if (!winner) {
    const selected = document.querySelector('.winner-option.selected');
    if (!selected) {
      showToast('⚠ Select winner');
      return;
    }
    winner = selected.getAttribute('data-winner');
  }

  const result = winner === 'r' ? '1:0' : '0:1';
  setResult(activeCell.r, activeCell.c, result);
  autoSave();
  closePopup();
  render();
  showToast(result === '1:0'
    ? `✓ Winner: ${PLAYERS[activeCell?.r]?.name ?? ''}`
    : `✓ Winner: ${PLAYERS[activeCell?.c]?.name ?? ''}`);

  // Check if tournament is complete
  checkTournamentComplete();
}

function clearResult() {
  if (!activeCell) return;
  clearResultAt(activeCell.r, activeCell.c);
  autoSave();
  closePopup();
  render();
  showToast('Result deleted');
}

// Enter key
document.getElementById('popup').addEventListener('click', e => {
  if (e.target === document.getElementById('popup')) closePopup();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('popup').classList.contains('active')) {
    closePopup();
  }
});

// ─── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ─── CELEBRATION ───────────────────────────────────────────────────────────
function checkTournamentComplete() {
  const stats = calcStats();
  const allPlayed = stats.every(s => s.remaining === 0);

  if (allPlayed) {
    // Tournament is complete! Find the winner
    const sorted = [...stats].sort((a,b) => b.pts - a.pts || b.wins - a.wins || a.losses - b.losses);
    const winner = sorted[0];

    // Show celebration after a short delay
    setTimeout(() => showCelebration(winner), 800);
  }
}

function showCelebration(winner) {
  const overlay = document.getElementById('celebration');
  const player = PLAYERS[winner.idx];
  const video = document.getElementById('winner-video');
  const videoSource = document.getElementById('winner-video-source');
  const avatarContainer = document.getElementById('winner-avatar-container');
  const avatar = document.getElementById('winner-avatar');

  // Set winner info
  document.getElementById('winner-name').textContent = player.name;
  document.getElementById('winner-stats').textContent =
    `${winner.wins} wins | ${winner.losses} losses | ${winner.pts} points`;

  // Try to load winner's video
  const videoPath = `resources/video/${player.name}.mp4`;

  // Check if video exists for this player
  fetch(videoPath, { method: 'HEAD' })
    .then(response => {
      if (response.ok) {
        // Video exists - show it
        videoSource.src = videoPath;
        video.load();
        video.style.display = 'block';
        avatarContainer.style.display = 'none';
        video.play().catch(err => console.log('Video autoplay blocked:', err));
      } else {
        // No video - show avatar
        avatar.src = player.avatar || '';
        video.style.display = 'none';
        avatarContainer.style.display = 'block';
      }
    })
    .catch(() => {
      // Error checking - fallback to avatar
      avatar.src = player.avatar || '';
      video.style.display = 'none';
      avatarContainer.style.display = 'block';
    });

  // Show overlay
  overlay.classList.add('active');

  // Create confetti
  createConfetti();
}

function closeCelebration() {
  const overlay = document.getElementById('celebration');
  const video = document.getElementById('winner-video');

  overlay.classList.remove('active');

  // Pause and reset video
  video.pause();
  video.currentTime = 0;

  // Remove confetti
  document.querySelectorAll('.confetti').forEach(c => c.remove());
}

function createConfetti() {
  const overlay = document.getElementById('celebration');
  const colors = ['#e8c06a', '#c9933a', '#7be89a', '#e87b7b', '#6b7094'];

  // Create 50 confetti pieces
  for (let i = 0; i < 50; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.animationDelay = Math.random() * 3 + 's';
    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
    overlay.appendChild(confetti);
  }
}

// ─── PERSIST ───────────────────────────────────────────────────────────────
function save() {
  // Download results.json file
  const blob = new Blob([JSON.stringify(results, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'results.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 File results.json downloaded!');
}

async function load() {
  try {
    const response = await fetch('results.json');
    if (response.ok) {
      const data = await response.json();
      results = data;
      render();
      checkTournamentComplete();
    }
  } catch(e) {
    console.log('No results.json found, starting fresh');
  }
}

// ─── INIT ──────────────────────────────────────────────────────────────────
// Try Firebase first, fallback to localStorage
const firebaseConnected = initFirebase();

if (!firebaseConnected) {
  loadFromStorage();
  if (Object.keys(results).length === 0) {
    load();
  }
}

// Always render initially (Firebase listener will update later)
render();
checkTournamentComplete();
</script>
</body>
</html>
