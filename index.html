<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polytopia Tournaments</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tournament-common.css">
</head>
<body>

<!-- Tournament Navigation (built dynamically from Firebase) -->
<div class="tournament-nav" id="tournament-nav"></div>

<div class="wrapper">

  <!-- Empty / error state (shown when no dynamic tournament is selectable) -->
  <div id="hub-empty" class="hub-empty" style="display:none;">Loading tournaments…</div>

  <!-- Dynamic tournament board -->
  <div id="hub-board" style="display:none;">

    <header>
      <div class="title-eyebrow">⚔ Tournament ⚔</div>
      <h1 id="hub-title">Tournament</h1>
      <div class="subtitle" id="hub-subtitle"></div>
    </header>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span>MATCHES PLAYED</span>
        <span id="progress-text">0 / 0</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard" id="scoreboard"></div>

    <!-- Matrix -->
    <div class="matrix-section">
      <div class="section-title">Match Results</div>
      <div class="matrix-wrap">
        <table class="matrix" id="matrix-table"></table>
      </div>
    </div>

    <!-- Rankings -->
    <div class="matrix-section" style="margin-top:2.5rem;">
      <div class="section-title">Rankings</div>
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
        <table class="rank-table" id="rank-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Player</th>
              <th>Points</th>
              <th>Wins</th>
              <th>Losses</th>
              <th>Remaining</th>
            </tr>
          </thead>
          <tbody id="rank-body"></tbody>
        </table>
      </div>
    </div>

  </div>

</div>

<!-- Shared UI components (popup, celebration, toast) are injected by tournament-common.js -->

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<!-- Common Tournament Logic -->
<script src="tournament-common.js"></script>

<!-- Dynamic Hub (Tournament 2.0) -->
<script>
// ═══════════════════════════════════════════════════════════════════════════
// DYNAMIC HUB
// ───────────────────────────────────────────────────────────────────────────
// This page has NO per-tournament config. It reads the "tournaments" registry
// from Firebase, builds the navigation dynamically, and renders the selected
// tournament in place. Legacy tournaments (1–4) are registry entries with
// legacy:true and point to their own indexN.html page. Dynamic tournaments
// (5+) carry a full `setup` + `players` config and render here via #t=<id>.
//
// To add a new tournament: add an entry to the "tournaments" node in Firebase
// (see HOW_TO_ADD_TOURNAMENT.md). No code changes, no new files.
// ═══════════════════════════════════════════════════════════════════════════

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBZtsslw-R17toTXbKBoikhc0vyOdAeDe0",
  authDomain: "polytournament-87d5b.firebaseapp.com",
  databaseURL: "https://polytournament-87d5b-default-rtdb.firebaseio.com",
  projectId: "polytournament-87d5b",
  storageBucket: "polytournament-87d5b.firebasestorage.app",
  messagingSenderId: "428892548438",
  appId: "1:428892548438:web:8c7a105e25fedd868b7af7"
};

initHub(FIREBASE_CONFIG);
</script>

</body>
</html>
